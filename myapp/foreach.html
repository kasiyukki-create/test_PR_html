<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課題提出用</title>
</head>
<body>
    <script>
        // 1. 数値の配列を作成
        const numbers = [10, 20, 30, 40, 50];

        // 2. forEachで各要素を2倍にして出力
        numbers.forEach(num => {
            console.log(num * 2);
        });
    </script>
</body>
</html>
