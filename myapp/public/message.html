<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>チャットアプリ</title>
</head>
<body>
    <h1>メッセージ一覧</h1>

    <form id="form">
        <label>名前：<input type="text" id="username" required></label>
        <label>メッセージ：<input type="text" id="text" required></label>
        <button type="submit">送信</button>
    </form>

    <ul id="messages"></ul>

    <script>
        const form = document.getElementById('form');
        const messagesList = document.getElementById('messages');

        // ④ページ読み込み時にメッセージを取得する
        async function getMessages() {
            const response = await fetch('/api/messages');
            const messages = await response.json();
            
            messagesList.innerHTML = ''; 
            messages.forEach(msg => {
                const li = document.createElement('li');
                li.textContent = `${msg.username}: ${msg.text}`;
                messagesList.appendChild(li);
            });
        }

        // メッセージを送信する関数
        async function sendMessage(username, text) {
            await fetch('/api/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, text })
            });
            
            getMessages(); // 送信後に一覧を更新
        }

        // フォームの送信イベント
        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const text = document.getElementById('text').value;
            
            await sendMessage(username, text);
            document.getElementById('text').value = ''; // メッセージ欄だけ空にする
        });

        // スクリプトの末尾に1行書くだけ
        getMessages();
    </script>
</body>
</html>
